<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Kelola Kas - Pemasukkan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/style/style.css">

</head>

<body>

    <div class="container-fluid">
        <div class="d-flex">
            <!-- SIDEBAR -->
            <div class="bg-white border-end vh-100" style="width: 260px;">
                <div class="p-3 border-bottom mb-3">
                    <h4 class="mb-0 text-primary fw-bold">Kas Kelas</h4>
                    <small class="text-muted">XI PPLG 2</small>
                </div>

                <ul class="nav flex-column p-2">
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center gap-2 text-dark" href="/index.html">
                            <i class="bi bi-grid-fill"></i>
                            Dashboard
                        </a>
                    </li>

                    <li class="nav-item mt-2">
                        <a class="nav-link active d-flex align-items-center gap-2 rounded bg-primary text-white"
                            href="kelolaKas.html">
                            <i class="bi bi-wallet2"></i>
                            Kelola Kas
                        </a>
                    </li>

                    <li class="nav-item mt-2">
                        <a class="nav-link d-flex align-items-center gap-2 text-dark" href="#">
                            <i class="bi bi-check-circle-fill"></i>
                            Status Kas
                        </a>
                    </li>

                    <li class="nav-item mt-2">
                        <a class="nav-link d-flex align-items-center gap-2 text-dark" href="#">
                            <i class="bi bi-receipt"></i>
                            Detail Kas
                        </a>
                    </li>
                </ul>

                <div class="position-absolute bottom-0 w-100 p-3">
                    <a class="nav-link text-danger d-flex align-items-center gap-2" href="#">
                        <i class="bi bi-box-arrow-left"></i>
                        <h6 class="mb-0">Keluar</h6>
                    </a>
                </div>
            </div>

            <div class="flex-grow-1 p-4">
                <h3 class="fw-bold mb-1">Pengeluaran</h3>
                <p class="text-muted mb-3">Mengatur pemasukkan dan pengeluaran kas</p>

                <div class="bg-white border rounded-pill p-1 mb-4 d-flex" style="max-width:420px">
                    <div class="flex-fill text-center toggle-btn text-muted">
                        <a href="pemasukkan.html" class="text-decoration-none text-black">Pemasukkan</a>
                    </div>
                    <div class="flex-fill text-center toggle-btn bg-danger text-white">
                        Pengeluaran
                    </div>
                </div>

                <!-- FORM CARD -->
                <div class="card shadow-sm" style="max-width:900px">
                    <div class="card-body p-4">
                        <div class="row">
                            <div class="col-md-6">
                                <!-- Pilih Murid -->
                                <div class="mb-3">
                                    <label class="form-label fw-semibold" for="tanggal">
                                        <i class="bi bi-calendar"></i> Tanggal transaksi
                                    </label>
                                    <input type="date" class="form-control" id="tanggal" name="tanggal" value=""
                                        readonly>
                                </div>

                                <!-- Pilih Bulan -->
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">
                                        <i class="bi bi-file-earmark-text"></i> Jenis pengeluaran
                                    </label>
                                    <select class="form-select">
                                        <option selected disabled>Pilih jenis pengeluaran</option>
                                        <option>Biaya Sekolah</option>
                                        <option>Biaya Kegiatan</option>
                                        <option>Biaya Lainnya</option>
                                    </select>
                                </div>

                                <!-- Jumlah -->
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">
                                        <i class="bi bi-cash"></i> Jumlah (Rp)
                                    </label>
                                    <input type="number" class="form-control" placeholder="Contoh: 5000">
                                </div>

                            </div>

                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Keterangan</label>
                                    <textarea class="form-control" rows="9"
                                        placeholder="Contoh: Pembayaran biaya sekolah untuk bulan April"></textarea>
                                </div>
                            </div>
                        </div>

                        <button class="btn btn-danger w-100 py-2 fw-bold rounded-pill">
                            SIMPAN
                        </button>

                    </div>
                </div>

            </div>
        </div>
    </div>

</body>

</html>

<script>
    // Mengambil elemen tanggal
    document.getElementById('tanggal').valueAsDate = new Date();
</script>
